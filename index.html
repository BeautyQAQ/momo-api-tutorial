<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>momoapi 中转站教程</title>
    <meta
      name="description"
      content="momoapi 中转站教程，覆盖快速开始、Codex、Claude Code、IDE 接入、网络代理和排错。"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="site-shell">
      <header class="topbar">
        <div class="topbar__left">
          <button class="icon-button mobile-only" id="sidebarToggle" aria-label="切换侧边栏">
            <span></span>
            <span></span>
            <span></span>
          </button>
          <a class="brand" href="#/">
            <div class="brand__mark">R</div>
            <div class="brand__copy">
              <strong>momoapi 教程</strong>
              <span>中转站接入文档</span>
            </div>
          </a>
        </div>
        <div class="topbar__center">
          <label class="searchbar" for="searchInput">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M10.5 4a6.5 6.5 0 1 1 0 13a6.5 6.5 0 0 1 0-13Zm0 2a4.5 4.5 0 1 0 0 9a4.5 4.5 0 0 0 0-9Zm7.914 10.5 2.793 2.793-1.414 1.414L17 17.914 18.414 16.5Z"
              ></path>
            </svg>
            <input id="searchInput" type="search" placeholder="搜索教程" />
            <kbd>Ctrl K</kbd>
          </label>
        </div>
        <nav class="topbar__nav" id="topNav"></nav>
      </header>

      <div class="layout">
        <aside class="sidebar" id="sidebar"></aside>

        <main class="content">
          <div class="content__inner" id="content"></div>
        </main>

        <aside class="toc" id="toc"></aside>
      </div>
    </div>

    <div class="search-modal hidden" id="searchModal" aria-hidden="true">
      <div class="search-modal__backdrop" data-close-modal="true"></div>
      <div class="search-modal__panel">
        <div class="search-modal__header">
          <label class="searchbar searchbar--modal" for="searchModalInput">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M10.5 4a6.5 6.5 0 1 1 0 13a6.5 6.5 0 0 1 0-13Zm0 2a4.5 4.5 0 1 0 0 9a4.5 4.5 0 0 0 0-9Zm7.914 10.5 2.793 2.793-1.414 1.414L17 17.914 18.414 16.5Z"
              ></path>
            </svg>
            <input id="searchModalInput" type="search" placeholder="搜索标题、正文、命令" />
          </label>
          <button class="icon-close" id="closeSearch" aria-label="关闭搜索">×</button>
        </div>
        <div class="search-results" id="searchResults"></div>
      </div>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
